<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;display=swap');
    </style>
    <!-- Radial glow for depth -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d0060"/>
      <stop offset="100%" stop-color="#0d001a"/>
    </radialGradient>
    <!-- Purple glow filter on FA -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="97" fill="url(#bgGrad)"/>
  <!-- Teal outer ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#03DAC5" stroke-width="2" opacity="0.8"/>
  <!-- Purple inner ring accent -->
  <circle cx="100" cy="100" r="86" fill="none" stroke="#6200EE" stroke-width="1" opacity="0.4"/>

  <!-- FA letters — Plus Jakarta Sans, rounded & bold -->
  <text
    x="100"
    y="118"
    font-family="'Plus Jakarta Sans', 'Nunito', 'Poppins', sans-serif"
    font-size="76"
    font-weight="800"
    fill="#BB86FC"
    text-anchor="middle"
    filter="url(#glow)"
    letter-spacing="2"
  >FA</text>

  <!-- Teal divider -->
  <line x1="58" y1="136" x2="142" y2="136" stroke="#03DAC5" stroke-width="1" opacity="0.55"/>

  <!-- by VN -->
  <text
    x="100"
    y="155"
    font-family="'Plus Jakarta Sans', 'Nunito', 'Poppins', sans-serif"
    font-size="14"
    font-weight="700"
    fill="#03DAC5"
    text-anchor="middle"
    letter-spacing="3"
    opacity="0.9"
  >by VN</text>
</svg>
